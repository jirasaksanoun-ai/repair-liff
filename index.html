<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>แจ้งซ่อม</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  body { margin:0; display:flex; align-items:center; justify-content:center;
         height:100vh; font-family:sans-serif; background:#f0f4f8; }
  .box { text-align:center; padding:24px; }
  .spinner { width:40px; height:40px; border:4px solid #ddd;
             border-top-color:#27ACB2; border-radius:50%;
             animation:spin 0.8s linear infinite; margin:0 auto 16px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  #msg { color:#555; font-size:0.95rem; }
  #err { color:#842029; background:#f8d7da; padding:12px 16px;
         border-radius:10px; font-size:0.85rem; display:none;
         max-width:300px; word-break:break-all; }
</style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <div id="msg">กำลังเชื่อมต่อ LINE...</div>
  <div id="err"></div>
</div>

<script>
// ===== ตั้งค่า =====
var LIFF_ID = '2009669941-3KAQDhQ4';
var GAS_URL = 'https://script.google.com/macros/s/AKfycbzlHkbIDRMgtWjMoTYWs4FFcmO7guzDhozvxdTSMKlzKpthViYoaryh9Jr0exu-dIN2bQ/exec';
// ===================

function setMsg(text) {
  document.getElementById('msg').textContent = text;
}

function showErr(text) {
  var el = document.getElementById('err');
  el.textContent = text;
  el.style.display = 'block';
  document.querySelector('.spinner').style.display = 'none';
  document.getElementById('msg').style.display = 'none';
}

async function init() {
  try {
    setMsg('กำลัง init LIFF...');
    
    await liff.init({ liffId: LIFF_ID });
    setMsg('LIFF init สำเร็จ');

    // ถ้ายังไม่ได้ login — ให้ login แล้วหยุดรอ redirect กลับมา
    if (!liff.isLoggedIn()) {
      setMsg('กำลัง redirect ไปหน้า login...');
      // redirectUri = หน้านี้เอง เพื่อให้กลับมา init ใหม่
      liff.login({ redirectUri: window.location.href.split('?')[0] });
      return;
    }

    setMsg('กำลังดึงโปรไฟล์...');
    var profile = await liff.getProfile();

    if (!profile || !profile.userId) {
      showErr('ดึงโปรไฟล์ไม่สำเร็จ กรุณาลองใหม่');
      return;
    }

    setMsg('เข้าสู่ระบบสำเร็จ กำลังเปิดฟอร์ม...');

    // สร้าง URL ไป GAS พร้อม profile
    var target = GAS_URL
      + '?page=report'
      + '&uid='  + encodeURIComponent(profile.userId)
      + '&name=' + encodeURIComponent(profile.displayName || '')
      + '&pic='  + encodeURIComponent(profile.pictureUrl  || '');

    // ใช้ replace เพื่อไม่ให้กด back กลับมาหน้านี้
    window.location.replace(target);

  } catch(e) {
    showErr('Error: ' + e.message + '\n\nURL: ' + window.location.search);
    console.error(e);
  }
}

init();
</script>
</body>
</html>
