<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>แจ้งซ่อม</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#555">
  <div style="text-align:center">
    <div style="width:36px;height:36px;border:3px solid #ddd;border-top-color:#27ACB2;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 12px"></div>
    <p id="msg">กำลังเข้าสู่ระบบ...</p>
  </div>
</div>
<style>@keyframes spin { to { transform: rotate(360deg); } }</style>
<script>
const LIFF_ID = '2009669941-3KAQDhQ4';
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzlHkbIDRMgtWjMoTYWs4FFcmO7guzDhozvxdTSMKlzKpthViYoaryh9Jr0exu-dIN2bQ/exec';

async function init() {
  try {
    document.getElementById('msg').textContent = 'กำลัง init LIFF...';
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      document.getElementById('msg').textContent = 'กำลัง login...';
      liff.login({ redirectUri: location.href });
      return;
    }

    document.getElementById('msg').textContent = 'กำลังดึงข้อมูล...';
    const profile = await liff.getProfile();

    // เก็บลง sessionStorage ก่อน redirect
    sessionStorage.setItem('liff_uid',  profile.userId);
    sessionStorage.setItem('liff_name', profile.displayName);
    sessionStorage.setItem('liff_pic',  profile.pictureUrl || '');

    document.getElementById('msg').textContent = 'กำลังเปิดฟอร์ม...';

    // redirect ไป GAS พร้อม uid ใน URL
    const url = GAS_URL + '?page=report&uid=' + encodeURIComponent(profile.userId)
                        + '&name=' + encodeURIComponent(profile.displayName)
                        + '&pic='  + encodeURIComponent(profile.pictureUrl || '');
    window.location.href = url;

  } catch(e) {
    document.getElementById('msg').textContent = 'Error: ' + e.message;
    console.error(e);
  }
}

init();
</script>
</body>
</html>
