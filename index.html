<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LIFF Debug</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  body { font-family: sans-serif; padding: 20px; background: #f0f4f8; }
  .box { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .label { color: #888; font-size: 0.75rem; margin-bottom: 4px; }
  .value { font-weight: bold; word-break: break-all; font-size: 0.9rem; }
  .ok  { color: #0a3622; }
  .err { color: #842029; }
  .warn { color: #856404; }
  button {
    width: 100%; padding: 14px; background: #27ACB2; color: white;
    border: none; border-radius: 10px; font-size: 1rem; cursor: pointer; margin-top: 8px;
  }
</style>
</head>
<body>

<div class="box"><div class="label">1. LIFF init</div><div class="value" id="r_init">รอ...</div></div>
<div class="box"><div class="label">2. isInClient (อยู่ใน LINE App จริงๆ?)</div><div class="value" id="r_client">รอ...</div></div>
<div class="box"><div class="label">3. isLoggedIn</div><div class="value" id="r_login">รอ...</div></div>
<div class="box"><div class="label">4. userId</div><div class="value" id="r_uid">รอ...</div></div>
<div class="box"><div class="label">5. displayName</div><div class="value" id="r_name">รอ...</div></div>
<div class="box"><div class="label">6. URL ปัจจุบัน</div><div class="value" id="r_url"></div></div>
<div class="box"><div class="label">7. context</div><div class="value" id="r_ctx"></div></div>

<button onclick="doLogin()">🔑 กด Login</button>
<button onclick="doProfile()" style="background:#1a2942;margin-top:8px">👤 getProfile</button>

<script>
var LIFF_ID = '2009669941-3KAQDhQ4';

function set(id, text, cls) {
  var el = document.getElementById(id);
  el.textContent = text;
  if (cls) el.className = 'value ' + cls;
}

document.getElementById('r_url').textContent = window.location.href;

async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    set('r_init', '✅ สำเร็จ', 'ok');

    var inClient = liff.isInClient();
    set('r_client', inClient ? '✅ ใช่ อยู่ใน LINE App' : '❌ ไม่ใช่ — เปิดจาก browser ภายนอก', inClient ? 'ok' : 'err');

    var loggedIn = liff.isLoggedIn();
    set('r_login', loggedIn ? '✅ true' : '❌ false', loggedIn ? 'ok' : 'err');

    try {
      var ctx = liff.getContext();
      set('r_ctx', ctx ? JSON.stringify(ctx) : 'null', ctx ? 'ok' : 'warn');
    } catch(e) {
      set('r_ctx', 'error: ' + e.message, 'err');
    }

    if (loggedIn) {
      await doProfile();
    } else {
      set('r_uid',  'ยังไม่ได้ login', 'warn');
      set('r_name', 'ยังไม่ได้ login', 'warn');
    }
  } catch(e) {
    set('r_init', '❌ ' + e.message, 'err');
  }
}

function doLogin() {
  liff.login({ redirectUri: window.location.href.split('?')[0] });
}

async function doProfile() {
  try {
    var p = await liff.getProfile();
    set('r_uid',  p.userId,      'ok');
    set('r_name', p.displayName, 'ok');
  } catch(e) {
    set('r_uid',  '❌ ' + e.message, 'err');
    set('r_name', '❌ ' + e.message, 'err');
  }
}

init();
</script>
</body>
</html>
