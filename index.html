<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>แจ้งซ่อม</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:sans-serif; background:#f0f4f8; }
  #loading {
    display:flex; flex-direction:column; align-items:center;
    justify-content:center; height:100vh; gap:12px; color:#555;
  }
  .spinner {
    width:40px; height:40px; border:4px solid #ddd;
    border-top-color:#27ACB2; border-radius:50%;
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  #err {
    color:#842029; background:#f8d7da; padding:12px 16px;
    border-radius:10px; font-size:0.85rem; display:none;
    max-width:320px; text-align:center; line-height:1.6;
  }
  /* iframe เต็มจอ ซ่อนไว้ก่อน */
  #gasFrame {
    display:none; position:fixed; inset:0;
    width:100%; height:100%; border:none;
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div id="msg">กำลังเชื่อมต่อ LINE...</div>
  <div id="err"></div>
</div>

<!-- iframe โหลด GAS ไว้รอ -->
<iframe id="gasFrame"
  src="https://script.google.com/macros/s/YOUR_DEPLOY_ID/exec?page=report">
</iframe>

<script>
var LIFF_ID = '2009669941-3KAQDhQ4';
var GAS_ORIGIN = 'https://script.googleusercontent.com'; // origin จริงของ GAS iframe

function setMsg(t) { document.getElementById('msg').textContent = t; }
function showErr(t) {
  document.getElementById('err').textContent = t;
  document.getElementById('err').style.display = 'block';
  document.querySelector('.spinner').style.display = 'none';
  setMsg('');
}

async function init() {
  try {
    setMsg('กำลัง init LIFF...');
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      setMsg('กำลัง login...');
      liff.login({ redirectUri: window.location.href.split('?')[0] });
      return;
    }

    setMsg('กำลังดึงโปรไฟล์...');
    var profile = await liff.getProfile();

    if (!profile || !profile.userId) {
      showErr('ดึงโปรไฟล์ไม่สำเร็จ\nกรุณาปิดแล้วเปิดใหม่');
      return;
    }

    setMsg('เปิดฟอร์ม...');

    var frame = document.getElementById('gasFrame');

    // รอให้ iframe โหลดเสร็จก่อน แล้วค่อยส่ง postMessage
    frame.onload = function() {
      // ส่ง profile ไปให้ GAS ผ่าน postMessage
      frame.contentWindow.postMessage({
        type:    'LIFF_PROFILE',
        uid:     profile.userId,
        name:    profile.displayName || '',
        pic:     profile.pictureUrl  || ''
      }, '*');

      // แสดง iframe ซ่อน loading
      document.getElementById('loading').style.display = 'none';
      frame.style.display = 'block';
    };

    // ถ้า iframe โหลดแล้ว (กรณี cache) ให้ส่งทันที
    if (frame.contentDocument && frame.contentDocument.readyState === 'complete') {
      frame.onload();
    }

  } catch(e) {
    showErr('เกิดข้อผิดพลาด:\n' + e.message);
    console.error(e);
  }
}

init();
</script>
</body>
</html>
