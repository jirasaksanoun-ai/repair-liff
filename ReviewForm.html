<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>ประเมินงานซ่อม</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
:root{--green:#34A853;--orange:#F57C00;--gray:#F5F7FA;--border:#E2E8F0;--text:#1A202C;--muted:#718096;--radius:16px;--shadow:0 4px 24px rgba(0,0,0,.08);}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans Thai',sans-serif;background:#F0FFF4;min-height:100vh;color:var(--text)}
#loading{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;}
.spinner{width:48px;height:48px;border:4px solid #E6F4EA;border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px;}
@keyframes spin{to{transform:rotate(360deg)}}
.header{background:linear-gradient(135deg,var(--green) 0%,#5AC87A 100%);padding:32px 24px 48px;color:#fff;text-align:center;}
.header-icon{font-size:2.5rem;margin-bottom:8px;display:block;}
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);margin:0 16px;padding:24px;margin-top:-24px;position:relative;z-index:10;}
.ticket-info{background:var(--gray);border-radius:12px;padding:16px;margin-bottom:24px;display:flex;align-items:flex-start;gap:12px;}
.ticket-info .icon{font-size:2rem}
.ticket-info h3{font-size:1rem;font-weight:700;color:var(--text)}
.ticket-info p{font-size:.85rem;color:var(--muted);margin-top:4px}
.rating-section{margin-bottom:24px}
.rating-section label{display:block;font-size:.8rem;font-weight:600;color:var(--muted);margin-bottom:12px;}
.rating-btns{display:flex;gap:12px}
.rating-btn{flex:1;padding:20px 10px;border:2px solid var(--border);border-radius:16px;background:#fff;cursor:pointer;text-align:center;transition:.2s;}
.rating-btn.selected-good{border-color:var(--green);background:#E6F4EA}
.rating-btn.selected-bad{border-color:var(--orange);background:#FFF3E0}
.rating-btn .emoji{font-size:2rem;display:block;margin-bottom:8px}
textarea{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:12px;font-size:.95rem;font-family:inherit;min-height:100px;resize:none;}
textarea:focus{outline:none; border-color:var(--green);}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:1rem;font-weight:700;color:#fff;background:var(--green);margin-top:10px;cursor:pointer;}
.success-screen{display:none;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;}
.success-screen.show{display:flex}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p>กำลังเตรียมข้อมูล...</p></div>

<div class="header">
  <span class="header-icon">⭐</span>
  <h1 style="font-size:1.5rem">ประเมินงานซ่อม</h1>
</div>

<div class="card" id="mainCard">
  <div class="ticket-info">
    <span class="icon">🎫</span>
    <div style="width:100%">
      <h3 id="ticketId">TK00000</h3>
      <p id="tIssue" style="color:var(--text); font-weight:600;">ปัญหา: -</p>
      <p id="tDetail">การแก้ไข: -</p>
      <div id="imgAfterContainer" style="display:none; margin-top:12px;">
        <span style="font-size:0.75rem; color:var(--muted); font-weight:bold;">📸 รูปถ่ายหลังซ่อมเสร็จ</span>
        <img id="imgAfterView" src="" style="width:100%; border-radius:8px; margin-top:4px; border:1px solid #ccc;">
      </div>
    </div>
  </div>

  <div class="rating-section">
    <label>ความพึงพอใจโดยรวม</label>
    <div class="rating-btns">
      <button class="rating-btn" id="btnGood" onclick="selectRating('พึงพอใจ')"><span class="emoji">😊</span><span style="font-weight:bold;color:var(--text)">พึงพอใจ</span></button>
      <button class="rating-btn" id="btnBad" onclick="selectRating('ควรปรับปรุง')"><span class="emoji">😐</span><span style="font-weight:bold;color:var(--text)">ควรปรับปรุง</span></button>
    </div>
  </div>

  <div class="rating-section">
    <label>💬 ความคิดเห็น / ข้อเสนอแนะ</label>
    <textarea id="txtFeedback" placeholder="แสดงความคิดเห็นเพิ่มเติม..."></textarea>
  </div>

  <button class="btn" id="btnSubmit" onclick="submitReview()">✅ ส่งการประเมิน</button>
</div>

<div class="success-screen" id="successScreen">
  <div style="font-size:4rem;margin-bottom:16px;">🎉</div>
  <h2>ขอบคุณสำหรับการประเมิน!</h2>
  <p style="color:var(--muted);margin-top:10px;">ความคิดเห็นของคุณช่วยให้เราปรับปรุงการให้บริการได้ดียิ่งขึ้น</p>
</div>

<script>
// ⚠️ ใส่ลิงก์ API ของคุณ
const API_URL = 'https://script.google.com/macros/s/AKfycbxvTT31CljbM8wIKi2jbm8fhFOUdu9MHKnk23jnOhuKQ7sG_32FCEmu3mLgNPqiH_kp_Q/exec'; 

let ticketId = '';
let selectedRating = '';

async function initApp() {
  const params = new URLSearchParams(location.search);
  ticketId = params.get('tid') || 'TK00000';
  document.getElementById('ticketId').textContent = ticketId;

  try {
    const res = await fetch(`${API_URL}?action=getTicket&id=${ticketId}`, { redirect: "follow" });
    const json = await res.json();
    if (json.success && json.data) {
        document.getElementById('tIssue').textContent = 'ปัญหา: ' + (json.data['Issue'] || '-');
        document.getElementById('tDetail').textContent = 'การแก้ไข: ' + (json.data['Fix_Detail'] || '-');
        if (json.data['Img_After']) {
            document.getElementById('imgAfterView').src = json.data['Img_After'];
            document.getElementById('imgAfterContainer').style.display = 'block';
        }
    }
  } catch(e) {}
  document.getElementById('loading').style.display = 'none';
}

function selectRating(val) {
  selectedRating = val;
  document.getElementById('btnGood').classList.remove('selected-good');
  document.getElementById('btnBad').classList.remove('selected-bad');
  document.getElementById(val === 'พึงพอใจ' ? 'btnGood' : 'btnBad').classList.add(val === 'พึงพอใจ' ? 'selected-good' : 'selected-bad');
}

async function submitReview() {
  if (!selectedRating) return alert('กรุณาเลือกความพึงพอใจ');

  const btn = document.getElementById('btnSubmit');
  btn.disabled = true; btn.textContent = 'กำลังส่ง...';

  const payload = {
    action: 'submitReview',
    data: { ticketId: ticketId, rating: selectedRating, feedback: document.getElementById('txtFeedback').value }
  };

  try {
    const res = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload), redirect: "follow" });
    const json = await res.json();
    if (json.success) {
      document.getElementById('mainCard').style.display = 'none';
      document.getElementById('successScreen').classList.add('show');
    } else {
      alert('Error: ' + json.error); btn.disabled = false; btn.textContent = '✅ ส่งการประเมิน';
    }
  } catch(err) { alert('เชื่อมต่อขัดข้อง'); btn.disabled = false; btn.textContent = '✅ ส่งการประเมิน'; }
}

window.onload = initApp;
</script>
</body>
</html>
