<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ประเมินงานซ่อม</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#555">
  <div style="text-align:center">
    <div style="width:36px;height:36px;border:3px solid #ddd;border-top-color:#27ACB2;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 12px"></div>
    <div>กำลังโหลด...</div>
  </div>
</div>
<style>@keyframes spin { to { transform: rotate(360deg); } }</style>
<script>
const LIFF_ID = '2009669941-2KJAIOid';
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzlHkbIDRMgtWjMoTYWs4FFcmO7guzDhozvxdTSMKlzKpthViYoaryh9Jr0exu-dIN2bQ/exec';

async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      liff.login({ redirectUri: location.href });
      return;
    }

    const profile  = await liff.getProfile();

    // ticketId ติดมากับ URL ที่ GAS ส่งมาใน Flex Message
    const ticketId = new URLSearchParams(location.search).get('ticketId') || '';

    const params = new URLSearchParams({
      page:     'review',
      ticketId: ticketId,
      uid:      profile.userId,
      name:     profile.displayName
    });

    window.location.href = GAS_URL + '?' + params.toString();

  } catch(e) {
    document.body.innerHTML = '<div style="padding:24px;color:red">เกิดข้อผิดพลาด: ' + e.message + '</div>';
  }
}

init();
</script>
</body>
</html>
